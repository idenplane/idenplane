<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 96" width="420" height="96">
  <!-- Concept C — Horizontal lockup (bracket mark + wordmark) -->

  <!-- Mark -->
  <g transform="translate(0 8)">
    <rect x="0" y="0" width="80" height="80" rx="12" fill="#0a0a0a"/>
    <g stroke="#ffffff" stroke-width="5" stroke-linecap="square" fill="none">
      <path d="M 25 22 L 18 22 L 18 58 L 25 58"/>
      <path d="M 55 22 L 62 22 L 62 58 L 55 58"/>
    </g>
    <rect x="30" y="36" width="20" height="7" rx="2" fill="#34d399"/>
  </g>

  <!-- Wordmark -->
  <text x="100" y="60"
        font-family="'Inter', 'Söhne', 'Helvetica Neue', sans-serif"
        font-size="40" font-weight="600" letter-spacing="-1.6"
        fill="#0a0a0a">idenplane</text>
</svg>
