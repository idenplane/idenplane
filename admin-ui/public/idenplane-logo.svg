<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 128" width="520" height="128">
  <title>Idenplane horizontal logo — light background</title>
  <!-- Horizontal lockup for light backgrounds.
       Mark on the left, wordmark on the right.
       Vertical alignment: mark height = cap height × 1.5 (visual balance). -->

  <!-- Mark (96×96, top-left at 8,16) -->
  <g transform="translate(8 16)">
    <rect x="0" y="0" width="96" height="96" rx="14" fill="#0a0a0a"/>
    <g stroke="#ffffff" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter" fill="none">
      <path d="M 32 28 L 22 28 L 22 68 L 32 68"/>
      <path d="M 64 28 L 74 28 L 74 68 L 64 68"/>
    </g>
    <rect x="36" y="44" width="24" height="8" rx="2" fill="#10b981"/>
  </g>

  <!-- Wordmark -->
  <text x="128" y="84"
        font-family="'Inter', 'Söhne', 'Helvetica Neue', Arial, sans-serif"
        font-size="56" font-weight="600" letter-spacing="-2.4"
        fill="#0a0a0a">idenplane</text>
</svg>
