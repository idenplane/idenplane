openapi: 3.0.3
info:
  title: Idenplane - Open Source Identity and Access Management
  description: |
    Idenplane is an open-source authentication and authorization server implementing
    the OAuth 2.0 and OpenID Connect protocols.

    ## Authentication

    This API supports two authentication mechanisms:
    1. **Admin API Key**: Include `x-admin-api-key: YOUR_KEY` header
    2. **Bearer Token**: Include `Authorization: Bearer TOKEN` header (for user-facing endpoints)

    ## Versioning

    API endpoints are versioned using URI versioning (`/api/v1/` prefix).

    ## Rate Limiting

    Some endpoints are rate-limited. See specific endpoint documentation for details.
  version: 1.0.0
  contact:
    name: Idenplane Project
    url: https://idenplane.dev
    email: support@idenplane.dev
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: http://localhost:3000/api/v1
    description: Local development server

security:
  - admin-api-key: []
  - bearerAuth: []

tags:
  - name: Realms
    description: Realm management operations
  - name: Users
    description: User management within realms
  - name: Clients
    description: OAuth client management
  - name: Groups
    description: Group management and membership
  - name: Roles
    description: Role management and assignments
  - name: OAuth
    description: OAuth 2.0 / OpenID Connect endpoints
  - name: Tokens
    description: Token operations (introspection, revocation)
  - name: Health
    description: Health check endpoints

paths:
  # ── Realms ──────────────────────────────────────────────────────────────────
  /admin/realms:
    get:
      tags:
        - Realms
      summary: List all realms
      description: Returns a list of all configured realms.
      operationId: listRealms
      responses:
        '200':
          description: List of realms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Realm'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags:
        - Realms
      summary: Create a new realm
      description: Creates a new realm with the specified configuration.
      operationId: createRealm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRealmRequest'
      responses:
        '201':
          description: Realm created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Realm'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/realms/themes:
    get:
      tags:
        - Realms
      summary: List available themes
      description: Returns a list of available theme presets.
      operationId: listThemes
      responses:
        '200':
          description: List of available themes
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /admin/realms/{realmName}:
    get:
      tags:
        - Realms
      summary: Get realm by name
      description: Returns the configuration of a specific realm.
      operationId: getRealm
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Realm details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Realm'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Realms
      summary: Update a realm
      description: Updates the configuration of a realm (full replacement).
      operationId: updateRealm
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRealmRequest'
      responses:
        '200':
          description: Realm updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Realm'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags:
        - Realms
      summary: Partially update a realm
      description: Updates specific fields of a realm (partial update).
      operationId: patchRealm
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRealmRequest'
      responses:
        '200':
          description: Realm updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Realm'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Realms
      summary: Delete a realm
      description: Permanently deletes a realm and all associated data.
      operationId: deleteRealm
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Realm deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/realms/{realmName}/export:
    get:
      tags:
        - Realms
      summary: Export a realm
      description: Exports a realm configuration as JSON. Can optionally include users and secrets.
      operationId: exportRealm
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
        - name: includeUsers
          in: query
          description: Include user data in export
          schema:
            type: boolean
            default: false
        - name: includeSecrets
          in: query
          description: Include secrets (passwords, keys) in export
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Realm export data
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/realms/{realmName}/email/test:
    post:
      tags:
        - Realms
      summary: Send test email
      description: Sends a test email to verify SMTP configuration.
      operationId: sendTestEmail
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - to
              properties:
                to:
                  type: string
                  format: email
                  description: Recipient email address
      responses:
        '200':
          description: Test email sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Test email sent successfully
        '400':
          description: Missing recipient or SMTP not configured
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/realms/import:
    post:
      tags:
        - Realms
      summary: Import a realm
      description: Imports a realm from JSON configuration.
      operationId: importRealm
      parameters:
        - name: overwrite
          in: query
          description: Overwrite existing realm if it exists
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Realm imported successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Realm'
        '400':
          description: Invalid import data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ── Users ────────────────────────────────────────────────────────────────────
  /admin/realms/{realmName}/users:
    get:
      tags:
        - Users
      summary: List users in a realm
      description: Returns a paginated list of users with optional filtering.
      operationId: listUsers
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          description: Page number (1-based)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of items per page
          schema:
            type: integer
            minimum: 1
            default: 20
        - name: search
          in: query
          description: Free-text search across username, email, firstName, lastName
          schema:
            type: string
        - name: username
          in: query
          description: Filter by username (contains, case-insensitive)
          schema:
            type: string
        - name: email
          in: query
          description: Filter by email (contains, case-insensitive)
          schema:
            type: string
        - name: firstName
          in: query
          description: Filter by first name
          schema:
            type: string
        - name: lastName
          in: query
          description: Filter by last name
          schema:
            type: string
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Users
      summary: Create a user
      description: Creates a new user in the specified realm.
      operationId: createUser
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/realms/{realmName}/users/{userId}:
    get:
      tags:
        - Users
      summary: Get user by ID
      description: Returns the details of a specific user.
      operationId: getUser
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Users
      summary: Update a user
      description: Updates a user's information (full replacement).
      operationId: updateUser
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags:
        - Users
      summary: Partially update a user
      description: Updates specific fields of a user (partial update).
      operationId: patchUser
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Users
      summary: Delete a user
      description: Permanently deletes a user.
      operationId: deleteUser
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: User deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/realms/{realmName}/users/{userId}/reset-password:
    put:
      tags:
        - Users
      summary: Set user password
      description: Sets or resets a user's password.
      operationId: setUserPassword
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
                  minLength: 1
      responses:
        '204':
          description: Password updated successfully
        '400':
          description: Invalid password
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/realms/{realmName}/users/{userId}/send-verification-email:
    post:
      tags:
        - Users
      summary: Send verification email
      description: Sends or resends an email verification link to the user.
      operationId: sendVerificationEmail
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Verification email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Verification email sent
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/realms/{realmName}/users/{userId}/offline-sessions:
    get:
      tags:
        - Users
      summary: List offline sessions
      description: Returns a list of offline sessions for the user.
      operationId: listOfflineSessions
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of offline sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OfflineSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/realms/{realmName}/users/{userId}/offline-sessions/{tokenId}:
    delete:
      tags:
        - Users
      summary: Revoke offline session
      description: Revokes a specific offline session.
      operationId: revokeOfflineSession
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Offline session revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Clients ─────────────────────────────────────────────────────────────────
  /admin/realms/{realmName}/clients:
    get:
      tags:
        - Clients
      summary: List clients in a realm
      description: Returns a list of all OAuth clients.
      operationId: listClients
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Client'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Clients
      summary: Create a client
      description: Creates a new OAuth client in the realm.
      operationId: createClient
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClientRequest'
      responses:
        '201':
          description: Client created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/realms/{realmName}/clients/{clientId}:
    get:
      tags:
        - Clients
      summary: Get client by ID
      description: Returns the details of a specific client.
      operationId: getClient
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Client details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Clients
      summary: Update a client
      description: Updates a client's configuration (full replacement).
      operationId: updateClient
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClientRequest'
      responses:
        '200':
          description: Client updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags:
        - Clients
      summary: Partially update a client
      description: Updates specific fields of a client (partial update).
      operationId: patchClient
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClientRequest'
      responses:
        '200':
          description: Client updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Clients
      summary: Delete a client
      description: Permanently deletes a client.
      operationId: deleteClient
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Client deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/realms/{realmName}/clients/{clientId}/regenerate-secret:
    post:
      tags:
        - Clients
      summary: Regenerate client secret
      description: Regenerates the client secret for confidential clients.
      operationId: regenerateClientSecret
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Client secret regenerated
          content:
            application/json:
              schema:
                type: object
                properties:
                  clientSecret:
                    type: string
                    description: The new client secret (only shown once)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/realms/{realmName}/clients/{clientId}/service-account-user:
    get:
      tags:
        - Clients
      summary: Get service account
      description: Returns the service account user associated with this client.
      operationId: getServiceAccount
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Service account user details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Client or service account not found

  # ── Groups ───────────────────────────────────────────────────────────────────
  /admin/realms/{realmName}/groups:
    get:
      tags:
        - Groups
      summary: List all groups
      description: Returns a list of all groups in the realm.
      operationId: listGroups
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Group'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Groups
      summary: Create a group
      description: Creates a new group in the realm.
      operationId: createGroup
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
      responses:
        '201':
          description: Group created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/realms/{realmName}/groups/{groupId}:
    get:
      tags:
        - Groups
      summary: Get group by ID
      description: Returns the details of a specific group.
      operationId: getGroup
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Group details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Groups
      summary: Update a group
      description: Updates a group's information (full replacement).
      operationId: updateGroup
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGroupRequest'
      responses:
        '200':
          description: Group updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
