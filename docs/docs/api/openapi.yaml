  # ── OAuth / Token Endpoints ───────────────────────────────────────────────────
  /realms/{realmName}/protocol/openid-connect/auth:
    get:
      tags:
        - OAuth
      summary: Authorization endpoint (code flow)
      description: |
        OAuth 2.0 Authorization Endpoint. Initiates the authentication flow.
        If the user has an active session, they may be redirected directly to the redirect_uri.
        Supports PKCE (code_challenge and code_challenge_method parameters).
      operationId: authorize
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
        - name: client_id
          in: query
          required: true
          schema:
            type: string
          description: OAuth client ID
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
          description: OAuth redirect URI
        - name: response_type
          in: query
          required: true
          schema:
            type: string
            enum:
              - code
          description: OAuth response type
        - name: scope
          in: query
          schema:
            type: string
            default: openid
          description: OAuth scopes (space-separated, must include 'openid')
        - name: state
          in: query
          schema:
            type: string
          description: CSRF state parameter
        - name: nonce
          in: query
          schema:
            type: string
          description: Nonce for ID token
        - name: code_challenge
          in: query
          schema:
            type: string
          description: PKCE code challenge
        - name: code_challenge_method
          in: query
          schema:
            type: string
            enum:
              - S256
              - plain
          description: PKCE code challenge method
        - name: prompt
          in: query
          schema:
            type: string
            enum:
              - none
              - login
              - consent
              - select_account
          description: OIDC prompt parameter
        - name: acr_values
          in: query
          schema:
            type: string
          description: Requested Authentication Context Class Reference values
        - name: login_hint
          in: query
          schema:
            type: string
          description: Pre-fill the username field
      responses:
        '302':
          description: Redirect to login page or redirect_uri with authorization code
        '400':
          description: Invalid request - missing or invalid OAuth parameters

  /realms/{realmName}/protocol/openid-connect/token:
    post:
      tags:
        - OAuth
      summary: Token endpoint
      description: |
        OAuth 2.0 Token Endpoint. Exchanges authorization codes for tokens,
        performs refresh token operations, and handles client credentials grants.
      operationId: token
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - grant_type
              properties:
                grant_type:
                  type: string
                  enum:
                    - authorization_code
                    - refresh_token
                    - client_credentials
                    - password
                code:
                  type: string
                  description: Authorization code (for authorization_code grant)
                redirect_uri:
                  type: string
                  description: Redirect URI (for authorization_code grant)
                code_verifier:
                  type: string
                  description: PKCE code verifier (for authorization_code grant)
                refresh_token:
                  type: string
                  description: Refresh token (for refresh_token grant)
                client_id:
                  type: string
                  description: OAuth client ID
                client_secret:
                  type: string
                  description: OAuth client secret (for confidential clients)
                username:
                  type: string
                  description: Resource owner username (for password grant)
                password:
                  type: string
                  description: Resource owner password (for password grant)
                scope:
                  type: string
                  description: OAuth scopes
      responses:
        '200':
          description: Token response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Invalid grant or request
        '401':
          description: invalid_client - client authentication failed

  /realms/{realmName}/protocol/openid-connect/token/introspect:
    post:
      tags:
        - Tokens
      summary: Token introspection (RFC 7662)
      description: |
        Introspects an access or refresh token to determine if it is active.
        Requires client authentication (client_id/client_secret or Basic auth).
      operationId: introspectToken
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  description: The token to introspect
                client_id:
                  type: string
                  description: OAuth client ID
                client_secret:
                  type: string
                  description: OAuth client secret
      responses:
        '200':
          description: Token introspection result (active true/false)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenIntrospectionResponse'
        '400':
          description: Bad request - missing token parameter
        '401':
          description: invalid_client - client authentication failed

  /realms/{realmName}/protocol/openid-connect/revoke:
    post:
      tags:
        - Tokens
      summary: Token revocation (RFC 7009)
      description: Revokes an access or refresh token.
      operationId: revokeToken
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  description: The token to revoke
                token_type_hint:
                  type: string
                  enum:
                    - access_token
                    - refresh_token
                  description: Hint about the type of the token
                client_id:
                  type: string
                  description: OAuth client ID
                client_secret:
                  type: string
                  description: OAuth client secret
      responses:
        '200':
          description: Token successfully revoked (or was already invalid)
        '400':
          description: Bad request - missing token parameter
        '401':
          description: invalid_client - client authentication failed

  /realms/{realmName}/protocol/openid-connect/logout:
    get:
      tags:
        - OAuth
      summary: RP-Initiated Logout (GET)
      description: |
        OIDC Front-Channel Logout Endpoint. Implements RP-initiated logout as per spec.
        Ends the user session and optionally redirects to post_logout_redirect_uri.
      operationId: logoutGet
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
        - name: id_token_hint
          in: query
          schema:
            type: string
          description: ID token for logout validation
        - name: post_logout_redirect_uri
          in: query
          schema:
            type: string
          description: URI to redirect after logout
        - name: state
          in: query
          schema:
            type: string
          description: State parameter to pass through
      responses:
        '204':
          description: Session ended; no post_logout_redirect_uri provided
        '302':
          description: Redirect to post_logout_redirect_uri after session teardown
        '400':
          description: post_logout_redirect_uri does not match any registered URI

    post:
      tags:
        - OAuth
      summary: End session / logout (POST)
      description: Ends the user session using a refresh token.
      operationId: logoutPost
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
                  description: The refresh token to invalidate
      responses:
        '204':
          description: Session ended successfully
        '400':
          description: invalid_grant - refresh token not found or already revoked

  /realms/{realmName}/protocol/openid-connect/userinfo:
    get:
      tags:
        - OAuth
      summary: Get user info
      description: Returns the claims from the access token (OIDC UserInfo endpoint).
      operationId: getUserInfo
      parameters:
        - name: realmName
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User claims from the access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '401':
          description: invalid_token - missing or invalid Bearer token

  # ── Health ────────────────────────────────────────────────────────────────────
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns the health status of the server.
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
        '503':
          description: Server is unhealthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error

  /health/ready:
    get:
      tags:
        - Health
      summary: Readiness check
      description: Returns whether the server is ready to accept traffic.
      operationId: readinessCheck
      security: []
      responses:
        '200':
          description: Server is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
        '503':
          description: Server is not ready

  /health/live:
    get:
      tags:
        - Health
      summary: Liveness check
      description: Returns whether the server is alive.
      operationId: livenessCheck
      security: []
      responses:
        '200':
          description: Server is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: alive

components:
  securitySchemes:
    admin-api-key:
      type: apiKey
      name: x-admin-api-key
      in: header
      description: Admin API key for administrative endpoints

    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token for user-facing endpoints

  schemas:
    # ── Realm ──────────────────────────────────────────────────────────────────
    Realm:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: my-app
        displayName:
          type: string
          example: My Application
        enabled:
          type: boolean
          default: true
        accessTokenLifespan:
          type: integer
          description: Access token lifetime in seconds
          default: 300
        refreshTokenLifespan:
          type: integer
          description: Refresh token lifetime in seconds
          default: 1800
        registrationAllowed:
          type: boolean
          default: true
        requireEmailVerification:
          type: boolean
          default: false
        mfaRequired:
          type: boolean
          default: false
        bruteForceEnabled:
          type: boolean
          default: false
        passwordMinLength:
          type: integer
          default: 8
        passwordRequireUppercase:
          type: boolean
          default: false
        passwordRequireLowercase:
          type: boolean
          default: false
        passwordRequireDigits:
          type: boolean
          default: false
        passwordRequireSpecialChars:
          type: boolean
          default: false
        themeName:
          type: string
          default: idenplane
        defaultLocale:
          type: string
          default: en
        supportedLocales:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateRealmRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          pattern: '^[a-z0-9][a-z0-9-]*[a-z0-9]$'
          description: Unique realm identifier (lowercase slug)
          example: my-app
        displayName:
          type: string
          example: My Application
        enabled:
          type: boolean
          default: true
        accessTokenLifespan:
          type: integer
          minimum: 60
          default: 300
        refreshTokenLifespan:
          type: integer
          minimum: 60
          default: 1800
        smtpHost:
          type: string
        smtpPort:
          type: integer
          default: 587
        smtpUser:
          type: string
        smtpPassword:
          type: string
        smtpFrom:
          type: string
        smtpSecure:
          type: boolean
          default: false
        passwordMinLength:
          type: integer
          minimum: 1
          default: 8
        passwordRequireUppercase:
          type: boolean
          default: false
        passwordRequireLowercase:
          type: boolean
          default: false
        passwordRequireDigits:
          type: boolean
          default: false
        passwordRequireSpecialChars:
          type: boolean
          default: false
        bruteForceEnabled:
          type: boolean
          default: false
        maxLoginFailures:
          type: integer
          minimum: 1
          default: 5
        registrationAllowed:
          type: boolean
          default: true
        requireEmailVerification:
          type: boolean
          default: false
        mfaRequired:
          type: boolean
          default: false
        offlineTokenLifespan:
          type: integer
          minimum: 60
          default: 2592000
        eventsEnabled:
          type: boolean
          default: false
        adminEventsEnabled:
          type: boolean
          default: false
        themeName:
          type: string
          default: idenplane
        webAuthnEnabled:
          type: boolean
          default: false
        adaptiveAuthEnabled:
          type: boolean
          default: false

    UpdateRealmRequest:
      type: object
      properties:
        displayName:
          type: string
        enabled:
          type: boolean
        accessTokenLifespan:
          type: integer
        refreshTokenLifespan:
          type: integer
        smtpHost:
          type: string
        smtpPort:
          type: integer
        smtpUser:
          type: string
        smtpPassword:
          type: string
        smtpFrom:
          type: string
        smtpSecure:
          type: boolean
        passwordMinLength:
          type: integer
        passwordRequireUppercase:
          type: boolean
        passwordRequireLowercase:
          type: boolean
        passwordRequireDigits:
          type: boolean
        passwordRequireSpecialChars:
          type: boolean
        bruteForceEnabled:
          type: boolean
        maxLoginFailures:
          type: integer
        registrationAllowed:
          type: boolean
        requireEmailVerification:
          type: boolean
        mfaRequired:
          type: boolean
        offlineTokenLifespan:
          type: integer
        eventsEnabled:
          type: boolean
        adminEventsEnabled:
          type: boolean
        themeName:
          type: string

    # ── User ────────────────────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        realmId:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
        emailVerified:
          type: boolean
        firstName:
          type: string
        lastName:
          type: string
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastLogin:
          type: string
          format: date-time
        attributes:
          type: object
          additionalProperties: true

    CreateUserRequest:
      type: object
      required:
        - username
      properties:
        username:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        enabled:
          type: boolean
          default: true
        emailVerified:
          type: boolean
          default: false
        password:
          type: string
        attributes:
          type: object
          additionalProperties: true

    UpdateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        enabled:
          type: boolean
        emailVerified:
          type: boolean
        attributes:
          type: object
          additionalProperties: true

    # ── Client ──────────────────────────────────────────────────────────────────
    Client:
      type: object
      properties:
        id:
          type: string
          format: uuid
        realmId:
          type: string
          format: uuid
        clientId:
          type: string
          description: OAuth client ID (unique within realm)
        name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        clientType:
          type: string
          enum:
            - PUBLIC
            - CONFIDENTIAL
          description: Client type (PUBLIC or CONFIDENTIAL)
        publicClient:
          type: boolean
        consentRequired:
          type: boolean
        standardFlowEnabled:
          type: boolean
        implicitFlowEnabled:
          type: boolean
        directAccessGrantsEnabled:
          type: boolean
        serviceAccountsEnabled:
          type: boolean
        redirectUris:
          type: array
          items:
            type: string
        webOrigins:
          type: array
          items:
            type: string
        scopes:
          type: array
          items:
            type: string
        requiredAcr:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateClientRequest:
      type: object
      required:
        - clientId
      properties:
        clientId:
          type: string
        name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
          default: true
        clientType:
          type: string
          enum:
            - PUBLIC
            - CONFIDENTIAL
          default: PUBLIC
        consentRequired:
          type: boolean
          default: false
        standardFlowEnabled:
          type: boolean
          default: true
        implicitFlowEnabled:
          type: boolean
          default: false
        directAccessGrantsEnabled:
          type: boolean
          default: false
        serviceAccountsEnabled:
          type: boolean
          default: false
        redirectUris:
          type: array
          items:
            type: string
          description: Allowed redirect URIs
        webOrigins:
          type: array
          items:
            type: string
          description: Allowed CORS origins
        scopes:
          type: array
          items:
            type: string
          description: Assigned scope names

    UpdateClientRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        consentRequired:
          type: boolean
        standardFlowEnabled:
          type: boolean
        implicitFlowEnabled:
          type: boolean
        directAccessGrantsEnabled:
          type: boolean
        serviceAccountsEnabled:
          type: boolean
        redirectUris:
          type: array
          items:
            type: string
        webOrigins:
          type: array
          items:
            type: string
        scopes:
          type: array
          items:
            type: string

    # ── Group ───────────────────────────────────────────────────────────────────
    Group:
      type: object
      properties:
        id:
          type: string
          format: uuid
        realmId:
          type: string
          format: uuid
        name:
          type: string
        path:
          type: string
        attributes:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateGroupRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        path:
          type: string
        attributes:
          type: object
          additionalProperties: true

    UpdateGroupRequest:
      type: object
      properties:
        name:
          type: string
        path:
          type: string
        attributes:
          type: object
          additionalProperties: true

    # ── Role ────────────────────────────────────────────────────────────────────
    Role:
      type: object
      properties:
        id:
          type: string
          format: uuid
        realmId:
          type: string
          format: uuid
        clientId:
          type: string
          format: uuid
          description: Client ID if this is a client role (null for realm roles)
        name:
          type: string
        description:
          type: string
        composite:
          type: boolean
        attributes:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateRoleRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string

    UpdateRoleRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

    AssignRolesRequest:
      type: object
      required:
        - roleNames
      properties:
        roleNames:
          type: array
          items:
            type: string
          description: List of role names to assign

    RoleMappings:
      type: object
      properties:
        realmRoles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        clientRoles:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/Role'

    # ── Token ───────────────────────────────────────────────────────────────────
    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT access token
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: Token lifetime in seconds
        refresh_token:
          type: string
          description: Refresh token for obtaining new access tokens
        id_token:
          type: string
          description: OIDC ID token (when openid scope is requested)
        scope:
          type: string
          description: Space-separated list of granted scopes
        session_state:
          type: string
          description: OIDC session state value

    TokenIntrospectionResponse:
      type: object
      properties:
        active:
          type: boolean
          description: Whether the token is active
        scope:
          type: string
          description: Space-separated list of token scopes
        client_id:
          type: string
          description: Client that was issued the token
        username:
          type: string
          description: Resource owner username (if token type is access_token)
        token_type:
          type: string
          description: Token type hint
        exp:
          type: integer
          description: Token expiration time (Unix timestamp)
        iat:
          type: integer
          description: Token issued-at time (Unix timestamp)
        sub:
          type: string
          description: Subject (user) identifier
        iss:
          type: string
          description: Issuer identifier
        aud:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: Audience(s) the token was issued for

    OfflineSession:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        clientId:
          type: string
        createdAt:
          type: string
          format: date-time
        lastRefresh:
          type: string
          format: date-time
        ipAddress:
          type: string
        userAgent:
          type: string

    # ── User Info ───────────────────────────────────────────────────────────────
    UserInfo:
      type: object
      properties:
        sub:
          type: string
          description: Subject identifier (user ID)
        name:
          type: string
        given_name:
          type: string
        family_name:
          type: string
        preferred_username:
          type: string
        email:
          type: string
        email_verified:
          type: boolean
        picture:
          type: string
          format: uri

  responses:
    Unauthorized:
      description: Unauthorized - Missing or invalid authentication
      content:
        application/json:
          schema:
            type: object
            properties:
              statusCode:
                type: integer
                example: 401
              message:
                type: string
                example: Unauthorized

    Forbidden:
      description: Forbidden - Insufficient permissions
      content:
        application/json:
          schema:
            type: object
            properties:
              statusCode:
                type: integer
                example: 403
              message:
                type: string
                example: Forbidden

    NotFound:
      description: Not Found - Resource does not exist
      content:
        application/json:
          schema:
            type: object
            properties:
              statusCode:
                type: integer
                example: 404
              message:
                type: string
                example: Not Found

    BadRequest:
      description: Bad Request - Invalid request parameters
      content:
        application/json:
          schema:
            type: object
            properties:
              statusCode:
                type: integer
                example: 400
              message:
                type: string
                example: Bad Request
              error:
                type: string