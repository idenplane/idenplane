name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  opencode:
    if: |
      github.event_name == 'issues' ||
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: [self-hosted, linux, x64]
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Determine checkout ref
        id: ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ] && [ "${{ github.event.issue.pull_request != null }}" = "true" ]; then
            HEAD=$(gh pr view ${{ github.event.issue.number }} -R ${{ github.repository }} --json headRefName -q '.headRefName')
            echo "ref=$HEAD" >> $GITHUB_OUTPUT
          else
            echo "ref=main" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 0

      - name: Describe images via mmx vision (if any)
        id: vision
        if: github.event_name == 'issues'
        env:
          GH_TOKEN_DEFAULT: ${{ secrets.GITHUB_TOKEN }}
          BOT_PAT: ${{ secrets.BOT_PAT }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          set +e
          IMG_DIR=/tmp/issue-images
          rm -rf "$IMG_DIR" && mkdir -p "$IMG_DIR"

          # Extract image URLs (HTML <img src> and markdown ![](url))
          IMAGE_URLS=$(printf '%s' "$ISSUE_BODY" | grep -oE '(src="https?://[^"]+|!\[[^]]*\]\(https?://[^)]+)' | grep -oE 'https?://[^")]+' | sort -u || echo "")

          if [ -z "$IMAGE_URLS" ]; then
            echo "No images found in issue body"
            echo "descriptions=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Found image URL(s):"
          echo "$IMAGE_URLS"

          # Pick a token that can access the repo (PAT preferred, GITHUB_TOKEN fallback)
          DOWNLOAD_TOKEN="${BOT_PAT:-$GH_TOKEN_DEFAULT}"

          DESCRIPTIONS_FILE=/tmp/image_descriptions.txt
          rm -f "$DESCRIPTIONS_FILE"

          IDX=0
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            IDX=$((IDX+1))
            EXT=png
            case "$url" in
              *.jpg|*.jpeg) EXT=jpg ;;
              *.gif) EXT=gif ;;
              *.webp) EXT=webp ;;
            esac
            FILE_PATH="${IMG_DIR}/${IDX}.${EXT}"

            # Download image (verbose so we can debug)
            HTTP_CODE=$(curl -sL -o "$FILE_PATH" -w "%{http_code}" -H "Authorization: token ${DOWNLOAD_TOKEN}" "$url")
            BYTES=$(stat -c%s "$FILE_PATH" 2>/dev/null || echo "0")
            FILE_TYPE=$(file -b --mime-type "$FILE_PATH" 2>/dev/null || echo "unknown")
            echo "Image $IDX: HTTP=$HTTP_CODE, bytes=$BYTES, type=$FILE_TYPE"

            if [ "$HTTP_CODE" != "200" ] || [ "$BYTES" -lt 100 ] || [[ "$FILE_TYPE" != image/* ]]; then
              echo "::warning::Image $IDX download failed (HTTP $HTTP_CODE, type $FILE_TYPE)"
              echo "[Image $IDX: failed to download]" >> "$DESCRIPTIONS_FILE"
              continue
            fi

            echo "::notice::Image $IDX downloaded ($BYTES bytes), describing with mmx..."

            DESC_OUTPUT=$(mmx vision describe \
              --image "$FILE_PATH" \
              --prompt "Describe this image with extreme detail for a frontend developer who needs to recreate it in code. Cover: overall layout (header/main/footer regions, alignment), exact colors (give hex codes if possible) for backgrounds, text, borders, buttons. Typography (font weight, approximate size, color). All text content (transcribe verbatim). Spacing and padding. Icons and their positions. Shadows or gradients. Anything else that affects implementation." \
              --output json \
              --quiet \
              --non-interactive \
              --api-key "$MINIMAX_API_KEY" 2>&1)

            DESC=$(echo "$DESC_OUTPUT" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('content', d))" 2>/dev/null || echo "$DESC_OUTPUT")

            {
              echo ""
              echo "--- IMAGE $IDX DESCRIPTION ---"
              echo "$DESC"
              echo "--- END IMAGE $IDX ---"
            } >> "$DESCRIPTIONS_FILE"

            echo "::notice::Image $IDX described ($(echo "$DESC" | wc -c) chars)"
          done <<< "$IMAGE_URLS"

          # Pass descriptions as multiline output
          {
            echo "descriptions<<DESC_EOF"
            cat "$DESCRIPTIONS_FILE" 2>/dev/null
            echo "DESC_EOF"
          } >> $GITHUB_OUTPUT

      - name: Build prompt for issue events
        id: prompt
        if: github.event_name == 'issues'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          IMAGE_DESCRIPTIONS: ${{ steps.vision.outputs.descriptions }}
        run: |
          {
            echo "text<<PROMPT_EOF"
            echo "Implement the feature or fix described in this GitHub issue."
            echo ""
            echo "Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}"
            echo ""
            echo "${ISSUE_BODY}"
            echo ""
            if [ -n "$IMAGE_DESCRIPTIONS" ]; then
              echo "VISUAL CONTEXT (image descriptions extracted via vision model):"
              echo "$IMAGE_DESCRIPTIONS"
              echo ""
              echo "Use the image descriptions above as the source of truth for visual design. Match colors, layout, typography, and content exactly as described."
              echo ""
            fi
            echo "Critical guidelines:"
            echo "- Write clean, idiomatic, working code."
            echo "- If a package.json exists, run 'npm install' before running build/test commands."
            echo "- BEFORE FINISHING, you MUST run 'npm run build' (if package.json exists) and confirm it exits with code 0."
            echo "- If the build fails, fix the errors and run build again. Do NOT consider your work done until the build is green."
            echo "- DO NOT switch branches, push, or open pull requests yourself - the workflow handles that automatically."
            echo "PROMPT_EOF"
          } >> $GITHUB_OUTPUT

      - name: Run opencode (initial)
        uses: anomalyco/opencode/github@latest
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        with:
          model: minimax/MiniMax-M2.7
          prompt: ${{ steps.prompt.outputs.text }}

      - name: Find PR and issue numbers
        id: find_pr
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ] && [ "${{ github.event.issue.pull_request != null }}" = "true" ]; then
            PR=${{ github.event.issue.number }}
            BRANCH=$(gh pr view "$PR" -R ${{ github.repository }} --json headRefName -q '.headRefName')
          else
            BRANCH=$(git branch --show-current)
            PR=$(gh pr list -R ${{ github.repository }} --state open --head "$BRANCH" --json number -q '.[0].number // ""')
          fi
          ISSUE=$(echo "$BRANCH" | grep -oE 'issue[0-9]+' | head -1 | grep -oE '[0-9]+' || echo "")
          if [ "${{ github.event_name }}" = "issues" ]; then
            ISSUE=${{ github.event.issue.number }}
          fi
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "pr_number=$PR" >> $GITHUB_OUTPUT
          echo "issue_number=$ISSUE" >> $GITHUB_OUTPUT
          echo "Found: PR=$PR, branch=$BRANCH, issue=$ISSUE"

      - name: Verify build (initial attempt)
        id: verify
        if: success() && steps.find_pr.outputs.pr_number != ''
        run: |
          if [ -f package.json ]; then
            npm install --silent --no-audit --no-fund 2>&1 | tail -3
            ERRLOG=/tmp/build_error_log.txt
            if npm run build > "$ERRLOG" 2>&1; then
              echo "build_ok=true" >> $GITHUB_OUTPUT
              echo "::notice::Build verification passed (initial attempt)"
            else
              echo "build_ok=false" >> $GITHUB_OUTPUT
              echo "::warning::Build verification failed (initial attempt) - will retry"
              echo "--- error log ---"
              tail -50 "$ERRLOG"
              {
                echo "error<<ERR_EOF"
                tail -50 "$ERRLOG"
                echo "ERR_EOF"
              } >> $GITHUB_OUTPUT
            fi
          else
            echo "build_ok=true" >> $GITHUB_OUTPUT
          fi

      - name: Auto-fix build failure (inline retry)
        id: autofix
        if: success() && steps.find_pr.outputs.pr_number != '' && steps.verify.outputs.build_ok == 'false'
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ steps.find_pr.outputs.branch }}
          ERROR: ${{ steps.verify.outputs.error }}
        run: |
          echo "::notice::Attempting auto-fix of build failure..."

          # Build the retry prompt to a file (avoid shell escape issues)
          {
            echo "The npm build is currently failing on this branch. Fix the build errors below by editing files."
            echo "Stay on this branch (do NOT switch branches or open new PRs). After fixing, run 'npm run build' again to confirm it exits 0."
            echo ""
            echo "Build error output:"
            echo ""
            echo '```'
            echo "$ERROR"
            echo '```'
          } > /tmp/retry_prompt.txt

          PROMPT_TEXT=$(cat /tmp/retry_prompt.txt)

          # Run opencode CLI directly
          export PATH="$HOME/.opencode/bin:$PATH"
          which opencode || ls -la $HOME/.opencode/bin/

          opencode run --model minimax/MiniMax-M2.7 --dangerously-skip-permissions "$PROMPT_TEXT" 2>&1 | tail -100 || echo "(opencode run exited non-zero, continuing to verify)"

          # Configure git for commit
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Commit any changes the agent made
          if [ -z "$(git status --porcelain)" ]; then
            echo "::warning::Auto-fix made no changes"
            echo "made_changes=false" >> $GITHUB_OUTPUT
          else
            git add -A
            git commit -m "fix: auto-fix build errors via inline retry"

            # Push using GITHUB_TOKEN via http.extraheader (same mechanism as actions/checkout uses)
            AUTH_HEADER=$(printf "x-access-token:%s" "${GH_TOKEN}" | base64 -w0)
            git config "http.https://github.com/.extraheader" "AUTHORIZATION: basic ${AUTH_HEADER}"
            git push origin "$BRANCH"
            git config --unset "http.https://github.com/.extraheader" || true

            echo "made_changes=true" >> $GITHUB_OUTPUT
            echo "::notice::Auto-fix changes pushed to $BRANCH"
          fi

      - name: Verify build (after retry)
        id: verify_retry
        if: success() && steps.find_pr.outputs.pr_number != '' && steps.verify.outputs.build_ok == 'false' && steps.autofix.outputs.made_changes == 'true'
        run: |
          if [ -f package.json ]; then
            ERRLOG=/tmp/build_error_log_retry.txt
            if npm run build > "$ERRLOG" 2>&1; then
              echo "build_ok=true" >> $GITHUB_OUTPUT
              echo "::notice::Build verification passed (after retry)"
            else
              echo "build_ok=false" >> $GITHUB_OUTPUT
              echo "::warning::Build still failing after retry"
              tail -30 "$ERRLOG"
            fi
          else
            echo "build_ok=true" >> $GITHUB_OUTPUT
          fi

      - name: Auto-merge when build passes
        if: success() && steps.find_pr.outputs.pr_number != '' && (steps.verify.outputs.build_ok == 'true' || steps.verify_retry.outputs.build_ok == 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.find_pr.outputs.pr_number }}
          ISSUE: ${{ steps.find_pr.outputs.issue_number }}
        run: |
          gh pr update-branch "$PR" -R "$REPO" 2>&1 || echo "(branch up-to-date)"

          if gh pr merge "$PR" -R "$REPO" --squash --delete-branch --admin; then
            echo "::notice::Auto-merged PR #$PR to main"
            if [ -n "$ISSUE" ]; then
              gh issue comment "$ISSUE" -R "$REPO" --body "Auto-merged PR #$PR to main. main is now up-to-date with this issue's changes."
              gh issue close "$ISSUE" -R "$REPO" --reason completed
              echo "::notice::Closed issue #$ISSUE"
            fi
          else
            echo "::warning::Auto-merge failed for PR #$PR"
            gh pr comment "$PR" -R "$REPO" --body "Auto-merge failed - likely a merge conflict. Manual review needed."
            if [ -n "$ISSUE" ]; then
              gh issue comment "$ISSUE" -R "$REPO" --body "PR #$PR opened but auto-merge failed (likely conflicts). Manual review needed."
            fi
          fi

      - name: Comment when retry also failed
        if: success() && steps.find_pr.outputs.pr_number != '' && steps.verify.outputs.build_ok == 'false' && steps.verify_retry.outputs.build_ok != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.find_pr.outputs.pr_number }}
          ISSUE: ${{ steps.find_pr.outputs.issue_number }}
        run: |
          gh pr comment "$PR" -R "$REPO" --body "Auto-fix retry attempted but build is still failing. Manual review and intervention needed."
          if [ -n "$ISSUE" ]; then
            gh issue comment "$ISSUE" -R "$REPO" --body "PR #$PR build still failing after auto-fix retry. Manual review needed."
          fi
