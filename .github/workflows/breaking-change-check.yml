name: Breaking Change Check

on:
  pull_request:
    branches: [main]
    paths:
      # Only run when source files that could affect the API surface change.
      # Dependency-only changes (package.json / package-lock.json) are excluded:
      # bumping a dependency cannot alter our own API surface, so it should not
      # trigger this gate (it was firing false failures on every Dependabot PR).
      - 'src/**'
      - 'prisma/**'

# Minimal default token permissions; the job only reads repo contents.
permissions:
  contents: read

jobs:
  breaking-change-check:
    name: API Breaking Change Detection
    runs-on: ubuntu-latest
    # Informational only for now. The spec diff boots the full app twice and
    # does a base-branch git dance, which is fragile and produces false
    # positives (it failed even on trivial dev-dependency bumps). Keep it
    # surfacing diffs without blocking merges until it's hardened post-1.0.
    continue-on-error: true

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: idenplane_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: idenplane_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://idenplane_test:test_password@localhost:5432/idenplane_test
      ADMIN_API_KEY: ci-test-key
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v7
        with:
          # Fetch full history so we can checkout the base branch
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations (current branch)
        run: npx prisma migrate deploy

      - name: Build current branch
        run: npm run build

      - name: Generate OpenAPI spec (current branch)
        run: |
          node --input-type=module << 'EOF'
          import { NestFactory } from '@nestjs/core';
          import { SwaggerModule, DocumentBuilder } from '@nestjs/swagger';
          import { writeFileSync } from 'fs';
          import { AppModule } from './dist/app.module.js';

          const app = await NestFactory.create(AppModule, { logger: false });
          const config = new DocumentBuilder()
            .setTitle('Idenplane')
            .setVersion('0.1.0')
            .build();
          const doc = SwaggerModule.createDocument(app, config);
          writeFileSync('/tmp/current-spec.json', JSON.stringify(doc, null, 2));
          await app.close();
          process.exit(0);
          EOF

      - name: Checkout base branch
        run: git checkout origin/${{ github.base_ref }} -- .

      - name: Install dependencies (base)
        run: npm ci

      - name: Generate Prisma client (base)
        run: npx prisma generate

      - name: Build base branch
        run: npm run build

      - name: Generate OpenAPI spec (base branch)
        run: |
          node --input-type=module << 'EOF'
          import { NestFactory } from '@nestjs/core';
          import { SwaggerModule, DocumentBuilder } from '@nestjs/swagger';
          import { writeFileSync } from 'fs';
          import { AppModule } from './dist/app.module.js';

          const app = await NestFactory.create(AppModule, { logger: false });
          const config = new DocumentBuilder()
            .setTitle('Idenplane')
            .setVersion('0.1.0')
            .build();
          const doc = SwaggerModule.createDocument(app, config);
          writeFileSync('/tmp/base-spec.json', JSON.stringify(doc, null, 2));
          await app.close();
          process.exit(0);
          EOF

      - name: Restore PR branch files
        run: git checkout -

      - name: Install oasdiff
        run: |
          # Try to install oasdiff binary; fall back silently if unavailable
          curl -sL https://raw.githubusercontent.com/Tufin/oasdiff/main/install.sh \
            | bash -s -- /usr/local/bin || true

      - name: Compare OpenAPI specs for breaking changes
        run: |
          BASE_SPEC="/tmp/base-spec.json"
          CURRENT_SPEC="/tmp/current-spec.json"

          echo "==> Comparing OpenAPI specs"
          echo "    Base:    $BASE_SPEC"
          echo "    Current: $CURRENT_SPEC"

          BREAKING_FOUND=0

          if command -v oasdiff &> /dev/null; then
            echo "  Using oasdiff..."
            if ! oasdiff breaking "${BASE_SPEC}" "${CURRENT_SPEC}" --format text; then
              BREAKING_FOUND=1
            fi
          else
            echo "  oasdiff not available; using path-count heuristic..."
            CURRENT_PATHS=$(node -e "const s=require('${CURRENT_SPEC}'); console.log(Object.keys(s.paths||{}).length)")
            BASE_PATHS=$(node -e "const s=require('${BASE_SPEC}'); console.log(Object.keys(s.paths||{}).length)")
            echo "  Base paths: ${BASE_PATHS}, Current paths: ${CURRENT_PATHS}"
            if [ "${CURRENT_PATHS}" -lt "${BASE_PATHS}" ]; then
              echo "  BREAKING: Endpoints were removed (${CURRENT_PATHS} < ${BASE_PATHS})"
              BREAKING_FOUND=1
            fi
          fi

          if [ "${BREAKING_FOUND}" -eq "1" ]; then
            echo ""
            echo "Breaking API changes were detected."
            echo "Instead of modifying existing v1 endpoints, please:"
            echo "  1. Create new v2 endpoints under /api/v2/..."
            echo "  2. Mark the old v1 endpoints as deprecated (add @Deprecated decorator)"
            echo "  3. Update CHANGELOG.md with the breaking change notice"
            exit 1
          fi

          echo "No breaking API changes detected."

      - name: Upload spec artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: openapi-specs-comparison
          path: |
            /tmp/base-spec.json
            /tmp/current-spec.json
          retention-days: 7
