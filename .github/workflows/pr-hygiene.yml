name: PR Hygiene

## Baseline checks that every PR must pass:
##  - No accidental secret in the diff
##  - No changes to workflow files from a contributor PR (must be merged deliberately)
##  - No env / credentials files leaked
##  - Bot / auto-generated PRs (marked with the `autonomous` label) are bounded in size

on:
  pull_request:
    branches: [main]

# Minimal default token permissions; the job only reads the diff.
permissions:
  contents: read

jobs:
  hygiene:
    name: PR hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Forbid sensitive path changes in contributor PRs
        run: |
          set -e
          CHANGED=$(git diff --name-only origin/main...HEAD)
          echo "$CHANGED"
          # Block real env / secret / credential files, but allow committed
          # templates such as .env.example / .env.sample (they carry no secrets).
          OFFENDING=$(echo "$CHANGED" \
            | grep -E '(^|/)\.env([._-][^/]*)?$|(^|/)secrets/|(^|/)credentials/' \
            | grep -vE '\.(example|sample|template|dist)$' || true)
          if [ -n "$OFFENDING" ]; then
            echo "::error::PR touches env / secrets / credentials files:"
            echo "$OFFENDING"
            exit 1
          fi

      - name: Scan diff for inline secrets
        run: |
          set -e
          # Scan only ADDED lines (skip context, the +++ header and @@ hunk
          # headers) so a match must be introduced by this PR, and skip committed
          # templates whose placeholders (e.g. REPLACE_ME...) are not real secrets.
          HITS=$(git diff origin/main...HEAD \
              -- . ':(exclude)*.example' ':(exclude)*.sample' ':(exclude)*.template' ':(exclude)*.dist' \
            | grep -E '^\+[^+]' \
            | grep -iE '(api[_-]?key|secret|password|token|bearer)[^A-Za-z]*[:=][^A-Za-z]*[A-Za-z0-9_-]{20,}' || true)
          if [ -n "$HITS" ]; then
            echo "::error::Possible secret leaked in diff:"
            echo "$HITS"
            exit 1
          fi

      - name: Size limits for automated PRs
        run: |
          set -e
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
          if echo "$LABELS" | grep -q '"autonomous"'; then
            FILES=$(git diff --name-only origin/main...HEAD | wc -l)
            LINES=$(git diff --shortstat origin/main...HEAD | awk '{print $4 + $6}')
            echo "Automated PR — files=$FILES lines=${LINES:-0}"
            if [ "$FILES" -gt 15 ]; then
              echo "::error::Automated PR exceeds 15 files; split required"
              exit 1
            fi
            if [ "${LINES:-0}" -gt 300 ]; then
              echo "::error::Automated PR exceeds 300 lines; split required"
              exit 1
            fi
          else
            echo "Manual PR — size limits skipped"
          fi
