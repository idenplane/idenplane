version: 2
updates:
  # Backend (root package.json)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "Africa/Cairo"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    groups:
      nestjs:
        patterns:
          - "@nestjs/*"
      prisma:
        patterns:
          - "@prisma/*"
          - "prisma"
      types:
        patterns:
          - "@types/*"
        update-types:
          - minor
          - patch
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  # Admin UI
  - package-ecosystem: npm
    directory: "/admin-ui"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "Africa/Cairo"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
    # One grouped PR for all action bumps instead of a separate PR per action
    # (which previously opened 4 PRs touching the same workflow file).
    groups:
      github-actions:
        patterns:
          - "*"

  # Docker base images
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - docker

  # Documentation site (was unmonitored — a transitive uuid advisory sat here
  # with no fix PR because Dependabot wasn't watching this directory).
  - package-ecosystem: npm
    directory: "/docs"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "Africa/Cairo"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docs
    groups:
      docs-dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
