name: idenplane-go-examples
runtime:
  name: go
description: |
  Go examples for Idenplane Pulumi provider.
  This project contains examples demonstrating how to use the Idenplane provider
  to manage realms, clients, and other identity resources.

config:
  idenplane:apiUrl:
    value: "https://api.idenplane.io"
    description: "Idenplane API URL"
  idenplane:realm:
    value: "default"
    description: "Default realm for client operations"