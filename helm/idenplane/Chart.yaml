apiVersion: v2
name: authme
description: A Helm chart for AuthMe — a self-hosted authentication service built with NestJS.
type: application
version: 0.1.0
appVersion: "0.0.1"

keywords:
  - authme
  - authentication
  - sso
  - oauth
  - oidc
  - saml
  - webauthn

home: https://github.com/Islamawad132/Authme
sources:
  - https://github.com/Islamawad132/Authme

maintainers:
  - name: Islamawad132
    url: https://github.com/Islamawad132

dependencies:
  - name: postgresql
    version: "16.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "20.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
