# ──────────────────────────────────────────────────────────────────────────────
# Idenplane Helm Chart — Default Values
# Override any value with --set key=value or a custom values file.
# ──────────────────────────────────────────────────────────────────────────────

# Number of Idenplane pod replicas.
replicaCount: 1

# ── Image ─────────────────────────────────────────────────────────────────────
image:
  repository: islamawad/idenplane
  # Overrides the image tag. Defaults to Chart.appVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

# List of references to secrets in the same namespace to use for pulling the
# container image from a private registry.
imagePullSecrets: []

# Override the chart name used in resource labels and names.
nameOverride: ""
fullnameOverride: ""

# ── Service Account ───────────────────────────────────────────────────────────
serviceAccount:
  # Create a dedicated ServiceAccount for the Idenplane pods.
  create: true
  # Automatically mount the ServiceAccount API credentials.
  automount: true
  # Extra annotations to add to the ServiceAccount resource.
  annotations: {}
  # Override the generated ServiceAccount name.
  name: ""

# ── Pod Annotations & Labels ──────────────────────────────────────────────────
podAnnotations: {}
podLabels: {}

# ── Pod Security Context ──────────────────────────────────────────────────────
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000

# ── Container Security Context ────────────────────────────────────────────────
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

# ── Service ───────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 3000
  # Override the target container port (defaults to service.port).
  targetPort: ""
  annotations: {}

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: false
  # Ingress class name (e.g., "nginx", "traefik").
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: idenplane.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: idenplane-tls
  #    hosts:
  #      - idenplane.example.com

# ── Resources ─────────────────────────────────────────────────────────────────
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ── Liveness / Readiness / Startup Probes ────────────────────────────────────
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  # Allow up to 5 minutes (30 * 10s) for the container to start.
  failureThreshold: 30

# ── Horizontal Pod Autoscaler ─────────────────────────────────────────────────
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# ── Network Policy ────────────────────────────────────────────────────────────
networkPolicy:
  enabled: false
  ingress:
    enabled: true
    rules:
      # Allow ingress from ingress controllers / load balancers
      - ports:
          - port: 3000
        from:
          - podSelector:
              matchLabels:
                app.kubernetes.io/component: controller
  egress:
    enabled: true
    rules:
      # Allow egress to PostgreSQL
      - ports:
          - port: 5432
        to:
          - podSelector:
              matchLabels:
                app.kubernetes.io/name: postgresql
      # Allow egress to Redis
      - ports:
          - port: 6379
        to:
          - podSelector:
              matchLabels:
                app.kubernetes.io/name: redis

# ── Pod Disruption Budget ─────────────────────────────────────────────────────
podDisruptionBudget:
  enabled: false
  # Exactly one of minAvailable or maxUnavailable must be set.
  # minAvailable: 1
  maxUnavailable: 1

# ── Node Scheduling ───────────────────────────────────────────────────────────
nodeSelector: {}
tolerations: []
affinity: {}

# ── Additional Volumes & Mounts ───────────────────────────────────────────────
volumes: []
volumeMounts: []

# ── Persistent Volume Claim (Custom Themes / Storage) ─────────────────────────
# Enable when you need persistent storage for custom themes, uploads, or
# application data that must survive pod restarts.
persistence:
  enabled: false
  # PVC storage size (e.g., "1Gi", "10Gi").
  size: 1Gi
  # Access modes. Common options: "ReadWriteOnce", "ReadOnlyMany", "ReadWriteMany".
  accessModes:
    - ReadWriteOnce
  # StorageClass name. Leave empty to use the cluster's default StorageClass.
  storageClass: ""
  # Annotations to add to the PVC metadata.
  annotations: {}
  # Label selector for pre-existing PVs (use either storageClassName or selector,
  # not both).
  selector: {}

# ── Idenplane Application Configuration ─────────────────────────────────────────
env:
  # ── Server ────────────────────────────────────────────────────────────────
  # TCP port the Idenplane process listens on inside the container.
  PORT: "3000"

  # Node environment. Use "production" in live deployments.
  NODE_ENV: "production"

  # Public URL of the Idenplane instance (used for redirect URIs, emails, etc.).
  BASE_URL: "http://idenplane.example.com"

  # ── Rate Limiting ─────────────────────────────────────────────────────────
  # Time-to-live window for the throttle limiter in milliseconds.
  THROTTLE_TTL: "60000"

  # Maximum number of requests allowed within THROTTLE_TTL.
  THROTTLE_LIMIT: "100"

  # ── Session Store ─────────────────────────────────────────────────────────
  # Backend used to store sessions: "database" (default) or "redis".
  # Switch to "redis" when redis.enabled is true for horizontal scalability.
  SESSION_STORE: "database"

# ── Sensitive / Secret Environment Variables ─────────────────────────────────
# Values in this section are stored in a Kubernetes Secret.
secrets:
  # Admin API key used to access protected administrative endpoints.
  # REQUIRED — change before deploying to production.
  ADMIN_API_KEY: "change-me-in-production"

  # Database connection string. When postgresql.enabled is true the chart
  # auto-constructs this from the postgresql sub-chart credentials; set an
  # explicit value only when connecting to an external database.
  DATABASE_URL: ""

  # Redis connection string. Required when redis.enabled is true or when
  # SESSION_STORE is "redis". Leave empty to disable Redis.
  REDIS_URL: ""

  # Redis Sentinel — comma-separated host:port pairs.
  REDIS_SENTINEL_HOSTS: ""

  # Redis Sentinel master name.
  REDIS_SENTINEL_NAME: ""

# ── PostgreSQL Sub-chart (Bitnami) ────────────────────────────────────────────
# https://artifacthub.io/packages/helm/bitnami/postgresql
# Set enabled: false and configure secrets.DATABASE_URL to use an external DB.
postgresql:
  enabled: true
  auth:
    username: idenplane
    password: idenplane
    database: idenplane
    # Existing Kubernetes Secret that holds the postgres passwords.
    # When set, the password fields above are ignored.
    existingSecret: ""
  primary:
    persistence:
      enabled: true
      size: 8Gi
  # Adjust resources for the PostgreSQL pod.
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── Redis Sub-chart (Bitnami) ─────────────────────────────────────────────────
# https://artifacthub.io/packages/helm/bitnami/redis
# Enable when you want a managed Redis instance for caching / session storage.
redis:
  enabled: false
  auth:
    enabled: true
    password: idenplane-redis
    existingSecret: ""
  architecture: standalone
  master:
    persistence:
      enabled: true
      size: 2Gi
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
